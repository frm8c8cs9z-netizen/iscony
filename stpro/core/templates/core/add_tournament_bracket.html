{% extends "core/base.html" %}

{% block content %}

<h2>
    {{ page_title|default:"トーナメント追加" }}
</h2>

<p>
    {{ tournament.name }}
</p>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        保存
    </button>

</form>

{% if bracket %}
    <form method="post">
        {% csrf_token %}
        <input
            type="hidden"
            name="action"
            value="reset_to_tournament_default"
        >
        <button
            type="submit"
            onclick="return confirm('このトーナメントの個別表示設定を大会デフォルトに戻します。よろしいですか？');"
        >
            大会デフォルトに戻す
        </button>
    </form>
{% endif %}

<p>
    <a href="{% url 'bracket_list' tournament.code %}">
        戻る
    </a>
</p>

{% endblock %}
