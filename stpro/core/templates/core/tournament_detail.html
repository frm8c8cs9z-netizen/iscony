{% extends "core/base.html" %}

{% block content %}

<h1>
    {{ tournament.name }}
</h1>

<p>
    大会コード:
    {{ tournament.code }}
</p>

<div class="menu">

    {% if not public_mode %}
        <a href="{% url 'maintenance_menu' tournament.code %}">
            管理メニュー
        </a>

        <a href="{% url 'tournament_settings' tournament.code %}">
            大会設定
        </a>
    {% endif %}

    <a href="{% url 'public_schedule_view_token' tournament.public_token %}">
        試合進行表
    </a>

</div>

<hr>

<h2>
    カテゴリ一覧
</h2>

<ul>

    {% for category in categories %}

        <li>

            <a href="{% url 'public_category_results_token' tournament.public_token category.public_token %}">
                {{ category.name }}
            </a>

        </li>

    {% empty %}

        <li>
            カテゴリがありません
        </li>

    {% endfor %}

</ul>

{% endblock %}
