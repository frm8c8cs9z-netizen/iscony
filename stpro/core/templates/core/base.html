<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>
        {% block title %}
        Soft Tennis Tournament
        {% endblock %}
    </title>

<style>

    body {
        font-family: sans-serif;
        margin: 20px;
    }

    a {
        text-decoration: none;
        color: #1565c0;
    }

    h1, h2, h3 {
        margin-top: 10px;
    }

    table {
        border-collapse: collapse;
        margin-bottom: 30px;
        min-width: 700px;
    }

    th, td {
        border: 1px solid #999;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #f0f0f0;
    }

    .win {
        background: #d7ffd7;
    }

    .lose {
        background: #ffd7d7;
    }

    .self-cell {
        background: #eeeeee;
    }

    .group-box {
        margin-bottom: 50px;
    }

    .court-box {
        border: 1px solid #999;
        padding: 15px;
        margin-bottom: 20px;
    }

    .schedule-card {
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 10px;
    }

    .search-box {
        margin-bottom: 20px;
    }

    .table-wrapper {
        overflow-x: auto;
    }

    .menu {
        margin-bottom: 20px;
    }

    .menu a {
        margin-right: 15px;
    }

    .import-links a {
        display: inline-block;
        margin-right: 15px;
    }

    .hover-cell {
        position: relative;
        min-width: 45px;
        height: 40px;
    }

    .score-link {
        display: block;
        width: 100%;
        height: 100%;
        color: inherit;
        text-decoration: none;
    }

    .hover-cell {
        position: relative;
        min-width: 45px;
        height: 40px;
        text-align: center;
        vertical-align: middle;
    }

    .score-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: inherit;
        text-decoration: none;
    }

    .hover-row {
        background-color: #fff7cc !important;
    }

    .hover-col {
        background-color: #fff7cc !important;
    }

    .hover-current {
        background-color: #ffd966 !important;
    }

    .hover-current::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-size: 14px;
        opacity: 0.6;
    }

    .retired-pair {
        color: #c00;
        text-decoration: line-through;
        text-decoration-thickness: 2px;
    }

    td .score-link {
        font-weight: bold;
    }

    td.retired-cell {
        color: #c00;
    }

    .score-sheet {
        border: 2px solid #000;
        padding: 16px;
        margin-bottom: 24px;
    }

    .score-sheet table {
        width: 100%;
        min-width: auto;
    }

    .page-break {
        page-break-after: always;
    }

    @media print {

        .menu,
        button {
            display: none;
        }

        .score-sheet {
            page-break-inside: avoid;
        }
    }

    /* =========================
       Schedule Status
    ========================= */

    .winner-cell {
        font-weight: bold;
        background-color: #fff3cd;
    }

    .called-row {
        background-color: #eef7ff;
    }

    .started-row {
        background-color: #fff3cd;
    }

    .finished-row {
        background-color: #e8f5e9;
    }

    .called-cell {
        background-color: #eef7ff;
    }

    .started-cell {
        background-color: #fff3cd;
        font-weight: bold;
    }

    .finished-cell {
        background-color: #e8f5e9;
        opacity: 0.45;
    }

    .finished-cell a {
        opacity:0.7;
    }

    .seed-match {
        opacity: 0.55;
    }

    .match-cell-table {
        width: 100%;
        border-collapse: collapse;
    }

    .match-cell-table td {
        padding: 2px 4px;
    }

    .score-cell {
        width: 24px;
        text-align: center;
        font-weight: bold;
    }

    /* =========================
       Tournament Bracket
    ========================= */

    .page-heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
    }

    .page-heading h2 {
        margin-bottom: 4px;
    }

    .subtle-text {
        margin: 0;
        color: #666;
    }

    .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
    }

    .action-row a,
    .match-actions a {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 4px 10px;
        border: 1px solid #b8c7dc;
        border-radius: 4px;
        background: #f7fbff;
        white-space: nowrap;
    }

    .stage-section {
        margin: 0 0 34px;
        padding: 0 0 26px;
        border-bottom: 2px solid #777;
    }

    .stage-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 10px 12px;
        background: #f0f0f0;
        border-left: 5px solid #1565c0;
    }

    .stage-heading > div:first-child {
        display: flex;
        align-items: baseline;
        gap: 10px;
    }

    .stage-heading h3 {
        margin: 0;
    }

    .stage-order {
        min-width: 24px;
        font-weight: bold;
    }

    .stage-code {
        color: #666;
        font-size: 0.9rem;
    }

    .stage-table {
        width: 100%;
        margin: 12px 0 0;
    }

    .stage-transition {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px;
        border-top: 1px solid #bbb;
        background: #fafafa;
    }

    .stage-transition span {
        display: inline-block;
        margin-left: 14px;
    }

    .bracket-scroll {
        overflow-x: auto;
        padding: 4px 0 24px;
    }

    .tournament-bracket {
        display: flex;
        align-items: flex-start;
        gap: 44px;
        min-width: max-content;
    }

    .bracket-round {
        display: flex;
        flex-direction: column;
        min-width: 280px;
    }

    .bracket-round h3 {
        margin: 0 0 14px;
        padding-bottom: 8px;
        border-bottom: 2px solid #d8dde6;
        text-align: left;
        color: #243041;
    }

    .round-matches {
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .bracket-match {
        position: relative;
        width: 280px;
        min-width: 280px;
        padding: 0;
        margin: 0;
        border: 1px solid #c9d1dc;
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 1px 2px rgba(20, 32, 50, 0.08);
    }

    .match-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 34px;
        margin: 0;
        padding: 7px 9px;
        border-bottom: 1px solid #dfe4eb;
        background: #f6f8fb;
        color: #42526a;
        font-size: 0.9rem;
        font-weight: bold;
    }

    .match-status {
        flex: 0 0 auto;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: bold;
    }

    .finished-status {
        background: #dff3e5;
        color: #23633a;
    }

    .ready-status {
        background: #e7f0ff;
        color: #245da8;
    }

    .pending-status,
    .seed-status {
        background: #eceff3;
        color: #657083;
    }

    .entry-row {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr) 34px;
        align-items: stretch;
        min-height: 54px;
        border-bottom: 1px solid #edf0f4;
    }

    .entry-row:nth-of-type(3) {
        border-bottom: 1px solid #dfe4eb;
    }

    .entry-seed,
    .entry-score {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafc;
        color: #5b6678;
        font-weight: bold;
    }

    .entry-score {
        font-size: 1.1rem;
        color: #202938;
    }

    .entry-main {
        min-width: 0;
        padding: 7px 8px;
    }

    .entry-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: bold;
        color: #1f2937;
    }

    .entry-meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-top: 3px;
        color: #667085;
        font-size: 0.84rem;
    }

    .entry-row.winner {
        background: #fff8dc;
    }

    .entry-row.winner .entry-seed,
    .entry-row.winner .entry-score {
        background: #fff1aa;
        color: #5c4700;
    }

    .bye {
        display: flex;
        align-items: center;
        min-height: 34px;
        color: #98a2b3;
        font-style: italic;
    }

    .match-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 42px;
        padding: 6px 8px;
        color: #7a8494;
        font-size: 0.9rem;
    }

    .seed-match {
        border-color: #d7b96a;
        opacity: 1;
    }

    .seed-match .match-header {
        background: #fff8e1;
    }

    @media (max-width: 700px) {

        body {
            margin: 12px;
        }

        .page-heading {
            display: block;
        }

        .action-row {
            justify-content: flex-start;
            margin-top: 10px;
        }

        .tournament-bracket {
            gap: 28px;
        }

        .bracket-round {
            min-width: 260px;
        }

        .bracket-match {
            width: 260px;
            min-width: 260px;
        }
    }

</style>

</head>
<body>

<h1>
    <a href="{% url 'tournament_list' %}">
        ソフトテニス大会管理
    </a>
</h1>

<div class="menu">

    <a href="{% url 'tournament_list' %}">
        大会一覧
    </a>

    <a href="{% url 'pair_search' %}">
        リーグ枠検索
    </a>

</div>

<hr>

{% if messages %}
    <div class="messages">
        {% for message in messages %}
            <p{% if message.tags %} class="{{ message.tags }}"{% endif %}>
                {{ message }}
            </p>
        {% endfor %}
    </div>
{% endif %}

{% block content %}
{% endblock %}

</body>
</html>
