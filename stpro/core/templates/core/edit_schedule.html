{% extends "core/base.html" %}

{% block content %}

<h2>進行編集</h2>

<p>
    {{ schedule.match.pair1.pair_code }}
    vs
    {{ schedule.match.pair2.pair_code }}
</p>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        保存
    </button>
    <button
        type="submit"
        name="action"
        value="delete"
        onclick="return confirm('この進行予定を削除しますか？');"
    >
        削除
    </button>

</form>

{% endblock %}
